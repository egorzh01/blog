{% extends "base.html" %}
{% block title %}
    Все записи
{% endblock title %}
{% block content %}
    {% for post in posts %}
        <article>
            <h2>
                <a href="{{ post.get_absolute_url }}">{{ post.title }}</a>
            </h2>
            <p>{{ post.body|truncatechars:200 }}</p>
            <time datetime="{{ post.created_at }}">{{ post.created_at|date:"d E Y" }}</time>
        </article>
    {% empty %}
        <p>Публикаций пока нет.</p>
    {% endfor %}
{% endblock content %}
